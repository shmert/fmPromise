<!doctype html>
Hello {{name}}

<script type="module"  >
	import fmPromise from '../src/fm-promise.js';

	let user = await fmPromise.evaluate('Get(UserName)')
	document.body.innerText = 'Hello, ' + user;

	async function testTypeSafety() {
		// 1. As you type 'Abstract', the IDE should suggest valid layout names.

		/**
		 * @type {AsMA_UHMS.Abstract[]}
		 */
		let records = await fmPromise.executeFileMakerDataAPIRecords({
			layouts: 'Abstract', limit:1
		});
		let firstRecord = records[0];
		console.log('firstRecord.recordId=' + firstRecord.recordId );
		let emails = firstRecord.Abstract__CoAuthors.map(co => `${co.firstName} ${co.lastName} <${co.email}>`);
		console.log('CoAuthors:', emails);
	}

	testTypeSafety();

</script>
